<!DOCTYPE html>
<html>
<head>
    <title>Edit Show</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Edit Show</h1>

<form method="POST" class="edit-form">
    <label for="title">Title</label>
    <input id="title" name="title" value="{{ show.title }}" placeholder="Title" required>

    <label for="release_year">Release Year</label>
    <input id="release_year" name="release_year" type="number" value="{{ show.release_year }}" required>

    <label for="total_seasons">Total Seasons</label>
    <input id="total_seasons" name="total_seasons" type="number" value="{{ show.total_seasons }}" required>

    <label for="imdb_rating">IMDb Rating</label>
    <input id="imdb_rating" name="imdb_rating" type="number" step="0.1" value="{{ show.imdb_rating }}" required>

    <label for="imdb_link">IMDb Link</label>
    <input id="imdb_link" name="imdb_link" type="text" value="{{ show.imdb_link }}" placeholder="https://www.imdb.com/title/..." required>

    <label for="seasons_watched">Seasons Watched</label>
    <input id="seasons_watched" name="seasons_watched" type="number" min="0" max="{{ show.total_seasons }}" value="{{ show.seasons_watched or 0 }}">

    <label>
        <input type="checkbox" name="finished" {% if show.finished %}checked{% endif %}> Finished
    </label>

    <label for="personal_rating">Personal Rating</label>
    <input id="personal_rating" name="personal_rating" type="number" step="0.1" min="0" max="10" value="{{ show.personal_rating or '' }}">

    <button type="submit">Save</button>
</form>

</body>
</html>
