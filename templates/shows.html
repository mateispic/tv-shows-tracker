<!DOCTYPE html>
<html>

<head>
    <title>TV Shows</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Google Icon -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>My TV Shows</h1>

    <form method="GET" action="/shows" class="search-form">
        <input type="text" name="q" placeholder="Search shows..." value="{{ search_query }}">
        <button type="submit" class="search-btn">
            <span class="material-symbols-outlined">search</span>
        </button>
    </form>

    {% if shows|length == 0 %}
    <p class="no-results">No shows found.</p>
    {% endif %}

    <div class="top-actions">
        <a href="/shows/add" class="add-btn">
            <span class="material-symbols-outlined">add</span> Add TV Show
        </a>
    </div>

    <div class="list">
        {% for show in shows %}
        <div class="row">

            <div class="left">
                <h3>{{ show.title }}</h3>

                <div class="meta">
                    <span>{{ show.release_year }}</span>
                    <span>⭐ {{ show.imdb_rating }}</span>
                    <a href="/shows/{{ show.id }}/episodes" class="imdb-link">
                        Episodes
                    </a>
                    <a href="{{ show.imdb_link }}" target="_blank" class="imdb-link">IMDb</a>
                </div>
            </div>

            <div class="actions">
                <!-- Edit -->
                <form action="/shows/{{ show.id }}/edit" method="GET">
                    <button type="submit" class="edit-icon-btn">
                        <span class="material-symbols-outlined">edit</span>
                    </button>
                </form>

                <!-- Delete -->
                <form action="/shows/{{ show.id }}/delete" method="POST">
                    <button type="submit" class="delete-icon-btn">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </form>
            </div>

        </div>
        {% endfor %}
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <p>Are you sure you want to delete this show?</p>
            <div class="modal-actions">
                <button id="confirmDelete">Yes</button>
                <button id="cancelDelete">No</button>
            </div>
        </div>
    </div>

    <script>
        const deleteForms = document.querySelectorAll('.delete-icon-btn');
        const modal = document.getElementById('deleteModal');
        const confirmBtn = document.getElementById('confirmDelete');
        const cancelBtn = document.getElementById('cancelDelete');

        let currentForm = null;

        deleteForms.forEach(btn => {
            btn.addEventListener('click', e => {
                e.preventDefault();
                currentForm = btn.closest('form');
                modal.style.display = 'flex';
            });
        });

        confirmBtn.addEventListener('click', () => {
            if (currentForm) currentForm.submit();
        });

        cancelBtn.addEventListener('click', () => {
            modal.style.display = 'none';
            currentForm = null;
        });

        window.addEventListener('click', e => {
            if (e.target === modal) {
                modal.style.display = 'none';
                currentForm = null;
            }
        });
    </script>

</body>

</html>
