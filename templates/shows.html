<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Shows Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>My TV Shows</h1>
    <div class="container">
        {% for show in shows %}
        <div class="card">
            <h2>{{ show.title }} <span>({{ show.release_year }})</span></h2>
            <p>Seasons: {{ show.total_seasons }}</p>
            <p>IMDb Rating: <strong>{{ show.imdb_rating }}</strong></p>
            <div class="links">
                <a href="{{ show.imdb_link }}" target="_blank">IMDb</a>
                <a href="/shows/{{ show.id }}/seasons">Seasons</a>
                <a href="/shows/{{ show.id }}/episodes">Episodes</a>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
